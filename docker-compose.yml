services:
  mysql:
    image: mysql:latest
    container_name: msql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=1234
      - MYSQL_DATABASE=productos_db
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: app
    depends_on:
      - mysql
    restart: on-failure
    ports:
      - "8081:8080"
    environment:
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=1234
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/productos_db?createDatabaseIfNotExist=true

volumes:
  mysql_data:
